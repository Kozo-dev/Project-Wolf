<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Wolf: The Complete Master</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    
    <style>
        /* 1. Global Texture & Background */
        body {
            background-color: #D2C4B3;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; font-family: 'Georgia', serif; color: #4A3C31;
            touch-action: manipulation; overflow: hidden;
        }

        /* 2. Coach HUD & Settings Button */
        .hud-container {
            width: 95vw; max-width: 500px; display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 10px; z-index: 10;
        }
        .coach-area { display: flex; gap: 15px; flex-grow: 1; }
        .portrait-box {
            width: 75px; height: 95px; background-color: #D9CDBA; border: 2px solid #5C4A3D; border-radius: 6px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.15); overflow: hidden; flex-shrink: 0;
        }
        .chat-bubble {
            background-color: #F8F4EC; border: 1px solid #C4BBAE; padding: 16px 20px; border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05); font-size: 17px; position: relative; line-height: 1.4; flex-grow: 1;
        }
        .chat-bubble::before { content: ''; position: absolute; left: -10px; top: 25px; border-style: solid; border-width: 10px 10px 10px 0; border-color: transparent #C4BBAE transparent transparent; }
        .chat-bubble::after { content: ''; position: absolute; left: -8px; top: 25px; border-style: solid; border-width: 10px 10px 10px 0; border-color: transparent #F8F4EC transparent transparent; }
        
        .settings-icon { font-size: 24px; cursor: pointer; color: #5C4A3D; margin-left: 10px; margin-top: 5px; transition: 0.2s; opacity: 0.8;}
        .settings-icon:active { transform: rotate(90deg); }

        /* 3. The Board & Coordinates */
        .board-container { display: flex; position: relative; width: 95vw; max-width: 500px; padding: 0; margin-top: 5px; }
        .y-axis { display: flex; flex-direction: column; justify-content: space-around; align-items: center; width: 20px; font-weight: bold; color: #7C6A5A; font-size: 14px; padding-bottom: 24px; }
        .board-column { display: flex; flex-direction: column; flex-grow: 1; }
        .x-axis { display: flex; justify-content: space-around; align-items: center; height: 24px; font-weight: bold; color: #7C6A5A; font-size: 14px; padding-left: 2px; }

        /* 🔥 The Clean Border Fix: Aspect-ratio forces a perfect square 🔥 */
        #board-frame {
            position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: 4px;
        }
        #myBoard {
            width: 100%; height: 100%; border: 3px solid #5C4A3D; border-radius: 4px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.08); background-color: #5C4A3D; box-sizing: border-box; overflow: hidden;
        }

        /* Square colors */
        .white-1e1d7 { background-color: #EFE8DF !important; }
        .black-3c85d { 
            background-color: #EFE8DF !important; 
            background-image: repeating-linear-gradient(-45deg, #A89C8F 0px, #A89C8F 2px, transparent 2px, transparent 8px) !important;
        }

        /* Piece rendering */
        .piece-417db {
            scale: 0.88; 
            filter: drop-shadow(0px 0px 2px #FFF) drop-shadow(0px 4px 5px rgba(0,0,0,0.4)) !important;
            transition: scale 0.1s ease-in-out; will-change: filter, scale; 
        }
        .selected-piece .piece-417db { scale: 0.95; }
        
        /* 🔥 The Dragging Fix: Reverted to src to catch the ghost piece! 🔥 */
        img.piece-417db[src*="/b"] { rotate: 180deg; }
        
        #arrow-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 100; overflow: visible;
        }

        /* 5. Highlights */
        .valid-move { position: relative; }
        .valid-move::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30%; height: 30%;
            border: 3px solid #D66D5C; border-radius: 50%; pointer-events: none; z-index: 5;
        }
        .selected-piece { box-shadow: inset 0 0 0 999px rgba(214, 109, 92, 0.3) !important; }
        .last-move { box-shadow: inset 0 0 0 999px rgba(220, 180, 100, 0.4) !important; }

        /* 6. Captured Pieces Wrappers */
        .captured-wrapper { width: 95vw; max-width: 480px; display: flex; justify-content: space-between; align-items: center; height: 36px; margin: 2px 0; padding-left: 10px; box-sizing: border-box; }
        /* Mirror the entire top tally for the black player */
        #wrapper-top {
            transform: rotate(180deg);
        }

        /* Ensure the material lead counter doesn't have an awkward margin when flipped */
        .material-advantage {
            font-size: 14px;
            font-weight: bold;
            color: #7C6A5A;
            /* Changed from margin-left to margin for better symmetry */
            margin: 0 10px; 
        }
        .captured-area { display: flex; align-items: center; }

        /* Only rotate pieces that are actually ON the board. 
        Captured pieces will now stay upright relative to their side. */
        #myBoard img.piece-417db[src*="/b"] { 
            rotate: 180deg; 
        }

        /* Ensure captured pieces don't inherit the board rotation */
        .captured-piece {
            width: 22px;
            height: 22px;
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.5));
            transform: scaleX(-1);
            rotate: 0deg !important;
        }

        /* Style A: Premium Fan */
        .style-fan .overlap-piece { margin-left: -14px; }
        .style-fan .new-group { margin-left: 6px; }
        .style-fan .new-group:first-child { margin-left: 0; }
        
        /* Style B: Ledger Tally */
        .style-badge .captured-area { gap: 14px; }
        .style-badge .captured-group { position: relative; display: flex; align-items: flex-end; gap: 4px; }
        .style-badge .captured-piece { width: 24px; height: 24px; margin: 0; }
        .piece-multiplier { color: #5C4A3D; font-size: 13px; font-weight: bold; font-family: 'Georgia', serif; margin-bottom: 3px; opacity: 0.85; }

        /* 7. Action Buttons */
        .btn-row { width: 95vw; max-width: 500px; display: flex; justify-content: center; margin-top: 15px; gap: 15px; }
        .action-btn {
            background-color: #F8F4EC; border: 1px solid #C4BBAE; padding: 12px 20px; font-size: 16px;
            border-radius: 6px; cursor: pointer; color: #5C4A3D; font-family: 'Georgia', serif; font-weight: bold;
            transition: 0.2s; box-shadow: 1px 1px 3px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px;
        }
        .action-btn:hover { background-color: #EFE8DF; }
        .action-btn:active { transform: translateY(2px); box-shadow: none; }

        /* 8. Modals */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #F8F4EC; background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            border: 3px solid #5C4A3D; border-radius: 8px; width: 80vw; max-width: 300px;
            padding: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        .modal-content h3 { margin-top: 0; color: #4A3C31; border-bottom: 2px solid #C4BBAE; padding-bottom: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-size: 16px; font-weight: bold;}
        select { padding: 5px; font-family: 'Georgia', serif; font-size: 14px; background-color: #EFE8DF; border: 1px solid #C4BBAE; border-radius: 4px; color: #4A3C31; outline: none; }
        .danger-btn { background-color: #D66D5C; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; font-family: 'Georgia', serif;}
        .close-btn { background-color: transparent; color: #7C6A5A; border: 1px solid #7C6A5A; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; font-family: 'Georgia', serif;}

        .promo-pieces { display: flex; gap: 15px; justify-content: center; }
        .promo-piece { width: 60px; height: 60px; cursor: pointer; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.3)); transition: transform 0.1s; }
        .promo-piece:active { transform: scale(0.9); }

        /* 9. End Screen */
        #end-screen { z-index: 2000; }
        .chronicle-paper { width: 85vw; max-width: 400px; }
        .chronicle-paper h1 { font-family: 'Cinzel', serif; font-size: 32px; margin-top: 0; color: #5C4A3D; }
        .chronicle-paper p { font-size: 18px; line-height: 1.4; margin-bottom: 30px; }
        .chronicle-btn { width: 100%; justify-content: center; }

        /* ✅ ARROW LAYER: Positioned inside #board-frame, perfectly covers the board */
        #arrow-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Clean fade-in for each arrow element */
        @keyframes arrowFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .mate-arrow-el {
            animation: arrowFadeIn 0.28s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="coach-area">
            <div class="portrait-box"><img src="https://ui-avatars.com/api/?name=Dr+W&background=D2C4B3&color=5C4A3D&size=100" style="width:100%; height:100%; object-fit: cover;"></div>
            <div class="chat-bubble" id="chatText">Welcome to the study. Your match is auto-saving.</div>
        </div>
        <div class="settings-icon" onclick="openSettings()">&#9881;</div>
    </div>

    <div class="captured-wrapper style-fan" id="wrapper-top">
        <div class="captured-area" id="captured-top"></div>
        <div class="material-advantage" id="adv-top"></div>
    </div>

    <div class="board-container">
        <div class="y-axis"><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span></div>
        <div class="board-column">
            <div id="board-frame">
                <div id="myBoard"></div>
                <svg id="arrow-layer" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            <div class="x-axis"><span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span></div>
        </div>
    </div>

    <div class="captured-wrapper style-fan" id="wrapper-bottom">
        <div class="captured-area" id="captured-bottom"></div>
        <div class="material-advantage" id="adv-bottom"></div>
    </div>

    <div class="btn-row">
        <button class="action-btn" onclick="undoMove()">&#8617; Undo</button> 
        <button class="action-btn" onclick="copyGame()">&#128203; Copy PGN</button>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>⚙️ Settings</h3>
            <div class="setting-row">
                <span>Capture Style:</span>
                <select id="style-toggle" onchange="changeStyle()">
                    <option value="fan">Premium Fan</option>
                    <option value="badge">Ledger Tally</option>
                </select>
            </div>
            <div class="setting-row">
                <span>Move Hints:</span>
                <select id="hints-toggle" onchange="changeHints()">
                    <option value="on">On</option>
                    <option value="off">Off</option>
                 </select>
            </div>
            <button class="danger-btn" onclick="resetGame()">🗑️ Reset Game</button>
            <button class="close-btn" onclick="closeSettings()">Close</button>
        </div>
    </div>

    <div id="promotion-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Promote Pawn</h3>
            <div class="promo-pieces">
                <img src="" id="promo-q" data-piece="q" class="promo-piece">
                <img src="" id="promo-r" data-piece="r" class="promo-piece">
                <img src="" id="promo-b" data-piece="b" class="promo-piece">
                <img src="" id="promo-n" data-piece="n" class="promo-piece">
            </div>
        </div>
    </div>

    <div id="end-screen" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content chronicle-paper">
            <h1 id="end-title">Checkmate</h1>
            <p id="end-desc">The White King has fallen. A decisive victory.</p>
            <button class="action-btn chronicle-btn" onclick="resetGame()">Start New Campaign</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $board = $('#myBoard');
        var squareToHighlight = null;
        var pendingPromotion = null;

        // ✅ AUDIO ENGINE ADDED HERE
        const sounds = {
            move: new Audio('sounds/move.mp3'),
            capture: new Audio('sounds/capture.mp3')
        };
        sounds.move.volume = 0.6;
        sounds.capture.volume = 0.8;

        // --- 💾 SETTINGS & MEMORY ---
        var currentStyle = localStorage.getItem('wolfCaptureStyle') || 'fan';
        $('#style-toggle').val(currentStyle);
        applyStyleClass();

        var showHints = localStorage.getItem('wolfShowHints') !== 'off';
        $('#hints-toggle').val(showHints ? 'on' : 'off');

        function changeHints() {
            showHints = $('#hints-toggle').val() === 'on';
            localStorage.setItem('wolfShowHints', showHints ? 'on' : 'off');
        }

        var savedPGN = localStorage.getItem('wolfSavedGame');
        if (savedPGN) { game.load_pgn(savedPGN); }

        function saveGameToDisk() { localStorage.setItem('wolfSavedGame', game.pgn()); }

        function resetGame() {
            if(confirm("Are you sure? This will wipe the board clean.")) {
                game.reset(); board.position(game.fen(), false); clearArrows();
                saveGameToDisk(); removeHighlights(); $board.find('.square-55d63').removeClass('last-move');
                updateCapturedPieces(); closeSettings(); $('#end-screen').hide();
                $('#chatText').text("The board is wiped. Let us begin anew.");
            }
        }

        function openSettings() { $('#settings-modal').css('display', 'flex'); }
        function closeSettings() { $('#settings-modal').css('display', 'none'); }
        
        function changeStyle() {
            currentStyle = $('#style-toggle').val();
            localStorage.setItem('wolfCaptureStyle', currentStyle);
            applyStyleClass(); updateCapturedPieces();
        }
        function applyStyleClass() {
            $('#wrapper-top, #wrapper-bottom').removeClass('style-fan style-badge').addClass('style-' + currentStyle);
        }

        // =====================================================================
        // ✅ DR. WOLF CHECKMATE ARROWS — Complete system
        // =====================================================================

        function sqToGrid(sq) {
            return { col: sq.charCodeAt(0) - 97, row: 8 - parseInt(sq[1]) };
        }

        function gridToSq(col, row) {
            if (col < 0 || col > 7 || row < 0 || row > 7) return null;
            return String.fromCharCode(97 + col) + (8 - row);
        }

        function sqToSVG(sq) {
            var g = sqToGrid(sq);
            return { x: g.col * 12.5 + 6.25, y: g.row * 12.5 + 6.25 };
        }

        function isPathClear(fromCol, fromRow, toCol, toRow, ignoreSq) {
            var dc = Math.sign(toCol - fromCol);
            var dr = Math.sign(toRow - fromRow);
            var c = fromCol + dc, r = fromRow + dr;
            var bd = game.board();
            while (c !== toCol || r !== toRow) {
                var isIgnored = ignoreSq && c === ignoreSq.col && r === ignoreSq.row;
                if (!isIgnored && bd[r][c] !== null) return false;
                c += dc; r += dr;
            }
            return true;
        }

        function canAttack(piece, fromCol, fromRow, toCol, toRow, ignoreSq) {
            var dc = toCol - fromCol, dr = toRow - fromRow;
            var adc = Math.abs(dc), adr = Math.abs(dr);
            if (dc === 0 && dr === 0) return false;
            switch (piece.type) {
                case 'p': {
                    var dir = (piece.color === 'w') ? -1 : 1;
                    return dr === dir && adc === 1;
                }
                case 'n':
                    return (adc === 1 && adr === 2) || (adc === 2 && adr === 1);
                case 'b':
                    return adc === adr && isPathClear(fromCol, fromRow, toCol, toRow, ignoreSq);
                case 'r':
                    return (dc === 0 || dr === 0) && isPathClear(fromCol, fromRow, toCol, toRow, ignoreSq);
                case 'q':
                    return (dc === 0 || dr === 0 || adc === adr) && isPathClear(fromCol, fromRow, toCol, toRow, ignoreSq);
                case 'k':
                    return adc <= 1 && adr <= 1;
            }
            return false;
        }

        function getAttackersOf(targetSq, attackerColor, ignoreSq) {
            var t  = sqToGrid(targetSq);
            var bd = game.board();
            var result = [];
            for (var r = 0; r < 8; r++) {
                for (var c = 0; c < 8; c++) {
                    var p = bd[r][c];
                    if (p && p.color === attackerColor && canAttack(p, c, r, t.col, t.row, ignoreSq)) {
                        result.push(gridToSq(c, r));
                    }
                }
            }
            return result;
        }

        function getKingSq(color) {
            var bd = game.board();
            for (var r = 0; r < 8; r++) {
                for (var c = 0; c < 8; c++) {
                    var p = bd[r][c];
                    if (p && p.type === 'k' && p.color === color) return gridToSq(c, r);
                }
            }
            return null;
        }

        function drawMateArrows() {
            clearArrows();
            if (!game.in_checkmate()) return;

            var loserColor  = game.turn();
            var attackColor = loserColor === 'w' ? 'b' : 'w';
            var kingSq      = getKingSq(loserColor);
            var kingGrid    = sqToGrid(kingSq);
            var bd          = game.board();

            var checkers    = getAttackersOf(kingSq, attackColor);
            var arrowQueue  = [];
            var drawnLines  = new Set();

            for (var dc = -1; dc <= 1; dc++) {
                for (var dr = -1; dr <= 1; dr++) {
                    if (dc === 0 && dr === 0) continue;
                    var escSq = gridToSq(kingGrid.col + dc, kingGrid.row + dr);
                    if (!escSq) continue;
                    var eg = sqToGrid(escSq);
                    var occupant = bd[eg.row][eg.col];
                    
                    if (occupant && occupant.color === loserColor) {
                        var sig = escSq + '-block';
                        if (!drawnLines.has(sig)) {
                            drawnLines.add(sig);
                            arrowQueue.push({ from: escSq, to: kingSq, type: 'blocker' });
                        }
                    }
                }
            }

            for (var dc2 = -1; dc2 <= 1; dc2++) {
                for (var dr2 = -1; dr2 <= 1; dr2++) {
                    if (dc2 === 0 && dr2 === 0) continue;
                    var escSq2 = gridToSq(kingGrid.col + dc2, kingGrid.row + dr2);
                    if (!escSq2) continue;
                    var eg2 = sqToGrid(escSq2);
                    var occupant2 = bd[eg2.row][eg2.col];
                    
                    if (occupant2 && occupant2.color === loserColor) continue;

                    var attackers = getAttackersOf(escSq2, attackColor, kingGrid);
                    if (attackers.length > 0) {
                        var from = attackers[0];
                        var sig = from + '-' + escSq2;
                        if (!drawnLines.has(sig)) {
                            drawnLines.add(sig);
                            arrowQueue.push({ from: from, to: escSq2, type: 'control' });
                        }
                    }
                }
            }

            checkers.forEach(function(from) {
                arrowQueue.push({ from: from, to: kingSq, type: 'check' });
            });

            var STAGGER = 240;
            arrowQueue.forEach(function(arrow, i) {
                setTimeout(function() { addArrow(arrow.from, arrow.to, arrow.type); }, i * STAGGER);
            });

            var popupDelay = arrowQueue.length * STAGGER + 1200;
            setTimeout(function() { $('#end-screen').css('display', 'flex'); }, popupDelay);
        }

        function addArrow(fromSq, toSq, type) {
            var ns    = 'http://www.w3.org/2000/svg';
            var start = sqToSVG(fromSq);
            var end   = sqToSVG(toSq);

            var dx = end.x - start.x, dy = end.y - start.y;
            var len = Math.sqrt(dx * dx + dy * dy);
            if (len < 0.001) return;

            var ux = dx / len, uy = dy / len;
            var px = -uy,      py =  ux;

            var isCheck   = (type === 'check');
            var isBlocker = (type === 'blocker');

            var color   = isCheck ? '#C85A47' : (isBlocker ? '#7A9CBF' : '#D4874A');
            var strokeW = isCheck ? 1.6        : (isBlocker ? 1.1       : 1.1);
            var headLen = isCheck ? 4.0         : (isBlocker ? 3.2       : 3.2);
            var headWid = isCheck ? 1.7         : (isBlocker ? 1.3       : 1.3);
            var alpha   = isCheck ? 0.92        : (isBlocker ? 0.72      : 0.78);

            var actualEnd = end;
            if (isBlocker) {
                actualEnd = { x: start.x + dx * 0.5, y: start.y + dy * 0.5 };
                dx = actualEnd.x - start.x; dy = actualEnd.y - start.y;
                len = Math.sqrt(dx * dx + dy * dy);
                ux = dx / len; uy = dy / len;
                px = -uy; py = ux;
            }

            var startPad = 2.6;
            var sx = start.x + ux * startPad;
            var sy = start.y + uy * startPad;

            var tipX  = actualEnd.x - ux * 1.0;
            var tipY  = actualEnd.y - uy * 1.0;
            var baseX = tipX - ux * headLen;
            var baseY = tipY - uy * headLen;

            var c1x = baseX + px * headWid, c1y = baseY + py * headWid;
            var c2x = baseX - px * headWid, c2y = baseY - py * headWid;

            var g = document.createElementNS(ns, 'g');
            g.setAttribute('class', 'mate-arrow-el');
            g.setAttribute('opacity', alpha);

            var line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', sx);    line.setAttribute('y1', sy);
            line.setAttribute('x2', baseX); line.setAttribute('y2', baseY);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', strokeW);
            line.setAttribute('stroke-linecap', 'round');

            var head = document.createElementNS(ns, 'polygon');
            head.setAttribute('points', tipX + ',' + tipY + ' ' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y);
            head.setAttribute('fill', color);

            var dot = document.createElementNS(ns, 'circle');
            dot.setAttribute('cx', start.x);
            dot.setAttribute('cy', start.y);
            dot.setAttribute('r',  isCheck ? '2.1' : '1.7');
            dot.setAttribute('fill', color);
            dot.setAttribute('opacity', '0.50');

            g.appendChild(dot);
            g.appendChild(line);
            g.appendChild(head);
            $('#arrow-layer')[0].appendChild(g);
        }

        function clearArrows() {
            $('#arrow-layer .mate-arrow-el').remove();
        }


        // =====================================================================
        // GAME LOGIC
        // =====================================================================

        function checkGameOver() {
            if (game.game_over()) {
                var title = "Game Over", desc = "";
                if (game.in_checkmate()) {
                    title = "Checkmate";
                    desc  = game.turn() === 'w'
                        ? "White's King is trapped. Black is victorious."
                        : "Black's King is trapped. White is victorious.";
                    $('#end-title').text(title); $('#end-desc').text(desc);
                    setTimeout(drawMateArrows, 500);
                    return;
                } else if (game.in_draw()) {
                    title = "A Quiet Draw";
                    desc  = "Neither side can find the path to victory. The battle ends in a draw.";
                }
                $('#end-title').text(title); $('#end-desc').text(desc);
                setTimeout(function() { $('#end-screen').css('display', 'flex'); }, 800);
            }
        }

        function updateAfterMove(move) {
            removeHighlights(); updateLastMove(move.from, move.to); updateCapturedPieces(); updateChat(move);
            squareToHighlight = null; checkGameOver(); saveGameToDisk();
            
            // ✅ SOUND ADDED HERE
            if (move.captured) {
                sounds.capture.currentTime = 0;
                sounds.capture.play();
            } else {
                sounds.move.currentTime = 0;
                sounds.move.play();
            }

            setTimeout(function() { board.position(game.fen(), true); }, 10);
        }

        function highlightMoves(square) {
            removeHighlights(); 
            // We always highlight the piece you selected
            $board.find('.square-' + square).addClass('selected-piece');
    
            // 🔥 Check the toggle state before drawing dots
            if (!showHints) return; 

            var moves = game.moves({ square: square, verbose: true });
            for (var i = 0; i < moves.length; i++) { 
                $board.find('.square-' + moves[i].to).addClass('valid-move'); 
            }
        }
        function removeHighlights() { $board.find('.square-55d63').removeClass('valid-move selected-piece'); }
        function updateLastMove(from, to) {
            $board.find('.square-55d63').removeClass('last-move');
            $board.find('.square-' + from + ', .square-' + to).addClass('last-move');
        }

        const PIECE_VALUES = { 'P': 1, 'N': 3, 'B': 3, 'R': 5, 'Q': 9, 'K': 0 };

        function updateCapturedPieces() {
            var history = game.history({ verbose: true });
            var capW = [], capB = [], wPts = 0, bPts = 0;
            for (var i = 0; i < history.length; i++) {
                if (history[i].captured) {
                    var piece = history[i].captured.toUpperCase();
                    if (history[i].color === 'w') { capW.push('b' + piece); wPts += PIECE_VALUES[piece]; } 
                    else { capB.push('w' + piece); bPts += PIECE_VALUES[piece]; }
                }
            }
            $('#adv-bottom').text(wPts > bPts ? '+' + (wPts - bPts) : '');
            $('#adv-top').text(bPts > wPts ? '+' + (bPts - wPts) : '');
            renderCaptured('#captured-bottom', capW); renderCaptured('#captured-top', capB);
        }

        function renderCaptured(selector, pieces) {
            var order = { 'Q': 1, 'R': 2, 'B': 3, 'N': 4, 'P': 5 };
            pieces.sort((a, b) => order[a.charAt(1)] - order[b.charAt(1)]);
            var html = '';
            if (currentStyle === 'fan') {
                var lastPieceType = '';
                for (var i = 0; i < pieces.length; i++) {
                    var currentType = pieces[i].charAt(1);
                    var overlapClass = (currentType === lastPieceType) ? ' overlap-piece' : ' new-group';
                    html += '<img src="img/chesspieces/' + pieces[i] + '.svg" class="captured-piece' + overlapClass + '" style="z-index: ' + (100 - i) + '">';
                    lastPieceType = currentType;
                }
            } else {
                var counts = {}; pieces.forEach(p => counts[p] = (counts[p] || 0) + 1);
                Object.keys(counts).forEach(p => {
                    html += '<div class="captured-group"><img src="img/chesspieces/' + p + '.svg" class="captured-piece">';
                    if (counts[p] > 1) { html += '<span class="piece-multiplier">x' + counts[p] + '</span>'; }
                    html += '</div>';
                });
            }
            $(selector).html(html);
        }

        function checkPromotion(from, to) {
            var moves = game.moves({ verbose: true });
            for (var i = 0; i < moves.length; i++) { if (moves[i].from === from && moves[i].to === to && moves[i].flags.includes('p')) return true; }
            return false;
        }

        function openPromotionModal(from, to) {
            pendingPromotion = { from: from, to: to };
            var color = game.turn(); 
            $('#promo-q').attr('src', 'img/chesspieces/' + color + 'Q.svg');
            $('#promo-r').attr('src', 'img/chesspieces/' + color + 'R.svg');
            $('#promo-b').attr('src', 'img/chesspieces/' + color + 'B.svg');
            $('#promo-n').attr('src', 'img/chesspieces/' + color + 'N.svg');
            $('#promotion-modal').css('display', 'flex');
        }

        $('.promo-piece').on('click', function() {
            var promoVal = $(this).attr('data-piece');
            $('#promotion-modal').css('display', 'none');
            var move = game.move({ from: pendingPromotion.from, to: pendingPromotion.to, promotion: promoVal });
            if (move) updateAfterMove(move);
            pendingPromotion = null;
        });

        function onDragStart(source, piece) {
            if (game.game_over() || $('#promotion-modal').css('display') === 'flex' || $('#settings-modal').css('display') === 'flex') return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
            squareToHighlight = source; highlightMoves(source);
        }

        function onDrop(source, target) {
            if (source === target) return 'snapback'; 
            removeHighlights(); squareToHighlight = null;
            if (checkPromotion(source, target)) { openPromotionModal(source, target); return 'snapback'; }
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateAfterMove(move);
        }

        var isClickHandled = false;
        $('#myBoard').on('touchend mouseup', '.square-55d63', function (e) {
            if (isClickHandled) return;
            if (e.type === 'touchend') { isClickHandled = true; setTimeout(() => isClickHandled = false, 300); }
            if (game.game_over() || $('#promotion-modal').css('display') === 'flex' || $('#settings-modal').css('display') === 'flex') return;

            var square = $(this).attr('data-square'); var piece = game.get(square);

            if (squareToHighlight && squareToHighlight !== square) {
                if (checkPromotion(squareToHighlight, square)) { openPromotionModal(squareToHighlight, square); squareToHighlight = null; removeHighlights(); return; }
                var move = game.move({ from: squareToHighlight, to: square, promotion: 'q' });
                if (move) { updateAfterMove(move); return; }
            }
            if (piece && piece.color === game.turn()) { squareToHighlight = square; highlightMoves(square); } 
            else { squareToHighlight = null; removeHighlights(); }
        });

        function undoMove() {
            game.undo(); board.position(game.fen(), true); removeHighlights(); clearArrows();
            $board.find('.square-55d63').removeClass('last-move'); 
            $('#chatText').text("Move reversed. Try a different strategy.");
            squareToHighlight = null; updateCapturedPieces(); saveGameToDisk();
        }

        function updateChat(move) {
            if (game.in_checkmate()) { $('#chatText').text("Checkmate! A brilliant finish."); } 
            else if (game.in_check()) { $('#chatText').text("Careful, your King is in check."); } 
            else if (move && move.flags.includes('p')) { $('#chatText').text("A powerful promotion!"); }
            else if (move && move.captured) { $('#chatText').text("A sharp capture."); } 
            else { $('#chatText').text(["Interesting move...", "Let's see how they respond.", "Solid positioning.", "The tension builds."][Math.floor(Math.random() * 4)]); }
        }

        var config = {
            draggable: true, position: 'start',
            onDragStart: onDragStart, onDrop: onDrop,
            onSnapEnd: function() { board.position(game.fen()); },
            showNotation: false, moveSpeed: 250, snapbackSpeed: 300, snapSpeed: 150,      
            pieceTheme: 'img/chesspieces/{piece}.svg'
        };
        board = Chessboard('myBoard', config);
        
        if (savedPGN) {
            board.position(game.fen(), false);
            var history = game.history({ verbose: true });
            if (history.length > 0) { updateLastMove(history[history.length - 1].from, history[history.length - 1].to); }
            checkGameOver();
        }
        updateCapturedPieces();

        function copyGame() {
            var pgn = game.pgn();
            if (!pgn) { alert("No moves played yet!"); return; }
            navigator.clipboard.writeText(pgn).then(() => alert("Game Copied to Clipboard!"));
        }
    </script>
</body>
</html>
